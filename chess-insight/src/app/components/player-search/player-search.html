<div class="container">

  <h2>Chess Player Search</h2>

  <input [(ngModel)]="username" placeholder="Enter Chess.com username">
  <button (click)="search()">Search</button>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <div *ngIf="player" class="player-card">
    <h3>{{ player.username }} <span *ngIf="player.title">({{ player.title }})</span></h3>
    <img *ngIf="player.avatar" [src]="player.avatar" width="100">
    <p>Name: {{ player.name || 'N/A' }}</p>
    <p>Country: {{ player.country }}</p>
  </div>

  <div *ngIf="stats" class="stats">
    <h4>Ratings</h4>
    <p>Blitz: {{ stats.blitz }}</p>
    <p>Rapid: {{ stats.rapid }}</p>
    <p>Bullet: {{ stats.bullet }}</p>
  </div>

</div>
